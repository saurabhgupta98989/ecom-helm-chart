apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-search
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: search
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          ports:
            - containerPort: 8082
          env:
            - name: AWS_SQS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: AWS_SQS_ACCESS_KEY_ID
            - name: AWS_SQS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-secret
                  key: AWS_SQS_SECRET_ACCESS_KEY