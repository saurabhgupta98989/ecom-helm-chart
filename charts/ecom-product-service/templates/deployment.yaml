apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-search
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8081
          env:
            - name: PRODUCT_SERVICE_URL
              value: http://product-service